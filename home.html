<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心沙园 Pro | 沉浸式对话疗愈</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            --panel-bg: rgba(255, 255, 255, 0.85);
            --primary-green: #66bb6a;
            --text-main: #2d4c3e;
            --sand-color: #f3e5ab;
            --wood-frame: #8d6e63;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'STHeiti', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* 背景氛围：呼吸感 */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.3;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            animation: breathe 8s infinite alternate;
        }

        @keyframes breathe {
            from { transform: scale(1); opacity: 0.2; }
            to { transform: scale(1.1); opacity: 0.4; }
        }

        .container {
            width: 95%; max-width: 800px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
        }

        .section {
            margin-bottom: 40px;
            animation: slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            color: #2e7d32;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 1.5rem;
            color: #388e3c;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #558b2f;
        }

        /* 功能卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature-card {
            background: rgba(255,255,255,0.6);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(102,187,106,0.2);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .feature-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 10px;
        }

        .feature-description {
            font-size: 0.9rem;
            color: #558b2f;
        }

        /* 按钮与输入 */
        .btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(102,187,106,0.4);
            margin: 10px;
        }

        .btn:hover {
            background: #4caf50;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,187,106,0.6);
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #388e3c;
        }

        .input-group input {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #c8e6c9;
            background: #f9fff9;
            font-size: 1rem;
            text-align: center;
            margin: 0 auto;
            display: block;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(102,187,106,0.2);
        }

        /* 兑换码区域 */
        .access-section {
            background: rgba(255,255,255,0.4);
            padding: 30px;
            border-radius: 25px;
            margin-top: 30px;
            border: 2px solid #c8e6c9;
        }

        .error-message {
            color: #d32f2f;
            margin: 10px 0;
            font-weight: bold;
        }

        .success-message {
            color: #388e3c;
            margin: 10px 0;
            font-weight: bold;
        }

        /* 沙具展示 */
        .sand-items-preview {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .sand-item-preview {
            font-size: 2rem;
            filter: drop-shadow(3px 3px 3px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .sand-item-preview:nth-child(2) { animation-delay: 0.5s; }
        .sand-item-preview:nth-child(3) { animation-delay: 1s; }
        .sand-item-preview:nth-child(4) { animation-delay: 1.5s; }
        .sand-item-preview:nth-child(5) { animation-delay: 2s; }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="ambient-bg"></div>

<div class="container">
    <!-- 头部区域 -->
    <div class="section">
        <h1>🌿 心沙园 Pro</h1>
        <p>沉浸式对话疗愈，探索内心的声音</p>
        <div class="sand-items-preview">
            <span class="sand-item-preview">👤</span>
            <span class="sand-item-preview">🌳</span>
            <span class="sand-item-preview">🏠</span>
            <span class="sand-item-preview">🐾</span>
            <span class="sand-item-preview">✨</span>
        </div>
    </div>

    <!-- 功能介绍 -->
    <div class="section">
        <h2>核心功能</h2>
        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">🏜️</div>
                <div class="feature-title">立体沙盘</div>
                <div class="feature-description">自由摆放沙具，随时调整位置，通过视觉化表达内心世界</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🎵</div>
                <div class="feature-title">疗愈音乐</div>
                <div class="feature-description">开始沙盘时播放舒缓的冥想音乐，营造放松的疗愈氛围</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔍</div>
                <div class="feature-title">深度分析</div>
                <div class="feature-description">基于沙具摆放位置和类型，生成个性化的心理分析报告</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📱</div>
                <div class="feature-title">沙具缩放</div>
                <div class="feature-icon">🗑️</div>
                <div class="feature-description">支持沙具放大缩小，右键点击删除，灵活调整沙盘布局</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🎯</div>
                <div class="feature-title">7大类别</div>
                <div class="feature-description">人物类、动物类、建筑类、交通工具类、家具和日用品类、植物与自然景物类、食物果实类</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">💌</div>
                <div class="feature-title">对话式分析</div>
                <div class="feature-description">采用温和的对话方式，提供个性化的心理洞察和建议</div>
            </div>
        </div>
    </div>

    <!-- 兑换码区域 -->
    <div class="section access-section">
        <h2>🔐 访问权限</h2>
        <p>请输入兑换码以访问心沙园 Pro 完整功能</p>
        <div class="input-group">
            <label for="accessCode">兑换码</label>
            <input type="text" id="accessCode" placeholder="请输入兑换码" autocomplete="off">
        </div>
        <div id="message" class="error-message" style="display: none;"></div>
        <button class="btn" onclick="checkAccessCode()">验证并进入</button>
    </div>
</div>

<script>
    function checkAccessCode() {
        const accessCode = document.getElementById('accessCode').value.trim();
        const message = document.getElementById('message');
        
        if (accessCode === 'Cici Wong') {
            message.textContent = '✅ 兑换码验证成功！正在进入心沙园...';
            message.className = 'success-message';
            message.style.display = 'block';
            
            // 延迟跳转到沙盘页面
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            message.textContent = '❌ 兑换码错误，请重新输入';
            message.className = 'error-message';
            message.style.display = 'block';
        }
    }

    // 支持回车键验证
    document.getElementById('accessCode').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkAccessCode();
        }
    });
</script>

</body>
</html>
